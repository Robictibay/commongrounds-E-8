{% extends 'bookclub/base.html' %}

{% block body %}
<h1>{{ book.title }}</h1>
<p><strong>Author:</strong> {{ book.author }}</p>
<p><strong>Year of Publication:</strong> {{ book.publication_year}}</p>
<p><strong>Genre:</strong> {{ book.genre.name }}</p>
<hr>
<p>
    {{ book.genre.name }}
    <br> - {{ book.genre.description }}
</p>
<a href="{% url 'book-list' %}">Back to all books</a>
{% endblock %}
