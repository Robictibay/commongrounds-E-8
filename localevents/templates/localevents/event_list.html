<h1>Local Events</h1>
<ul>
    {% for event in events %}
        <li>
            <a href="{% url 'event-detail' event.pk %}">{{ event.title }}</a> 
            ({{ event.category.name }}) - {{ event.start_time }}
        </li>
    {% empty %}
        <li>No events found.</li>
    {% endfor %}
</ul>
